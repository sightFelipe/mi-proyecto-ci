services:
  db:
    image: postgres:16-alpine
    container_name: mi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tasks_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d tasks_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mi-red

  backend:
    build: ./backend
    container_name: mi-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/tasks_db
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mi-red

networks:
  mi-red:
    driver: bridge
    name: mi-red

volumes:
  db_data:
    name: mi-db-data